name: Build & push frontend image

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/docker-build-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  FRONTEND_IMAGE: legoprice-frontend

jobs:
  build-and-push-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ACR secrets
        run: |
          if [[ -z "${{ secrets.ACR_LOGIN_SERVER }}" || -z "${{ secrets.ACR_USERNAME }}" || -z "${{ secrets.ACR_PASSWORD }}" ]]; then
            echo "Missing ACR secrets: ACR_LOGIN_SERVER, ACR_USERNAME, or ACR_PASSWORD"
            exit 1
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
