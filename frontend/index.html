<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGO Iceland Value Browser</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>LEGO Iceland Value Browser</h1>
    <p>Browse aggregated sets by value, price, and BrickLink 6-month sold stats.</p>
  </header>

  <section class="controls">
    <input id="search" type="text" placeholder="Search set number or name" />
    <select id="presetFilter">
      <option value="all">All sets</option>
      <option value="strictValue">Value focus (2+ store prices)</option>
      <option value="bricklinkLiquid">BrickLink liquid (sales ≥ 10)</option>
    </select>
    <select id="storeFilter">
      <option value="all">All stores</option>
      <option value="coolshop">Coolshop</option>
      <option value="kubbabudin">Kubbabudin</option>
      <option value="boozt">Boozt</option>
      <option value="hagkaup">Hagkaup</option>
      <option value="kidsworld">Kidsworld</option>
      <option value="elko">Elko</option>
    </select>
    <select id="themeFilter">
      <option value="all">All themes</option>
    </select>
    <select id="topN">
      <option value="all">All results</option>
      <option value="25">Top 25</option>
      <option value="50">Top 50</option>
      <option value="100">Top 100</option>
    </select>
    <select id="sortBy">
      <option value="value">Best value (pieces/ISK)</option>
      <option value="priceAsc">Lowest price</option>
      <option value="priceDesc">Highest price</option>
      <option value="ratioAsc">Lowest price vs BrickLink avg ratio</option>
      <option value="bricklinkAvg">BrickLink avg (USD)</option>
      <option value="bricklinkSales">BrickLink sales count</option>
    </select>
  </section>

  <main>
    <div id="summary" class="summary"></div>
    <section class="toplist">
      <h2>Top 10 (Current Filter)</h2>
      <table id="topTable">
        <thead>
          <tr>
            <th>Set</th>
            <th>Name</th>
            <th>Lowest</th>
            <th>Store</th>
            <th>Pieces/ISK</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
    <div id="grid" class="grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
