name: Run LEGO pipeline every 6 hours

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legoprice-run-all
  cancel-in-progress: false

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BRICKLINK_CONSUMER_KEY: ${{ secrets.BRICKLINK_CONSUMER_KEY }}
      BRICKLINK_CONSUMER_SECRET: ${{ secrets.BRICKLINK_CONSUMER_SECRET }}
      BRICKLINK_TOKEN: ${{ secrets.BRICKLINK_TOKEN }}
      BRICKLINK_TOKEN_SECRET: ${{ secrets.BRICKLINK_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium requests-oauthlib

      - name: Run pipeline
        run: |
          if [[ -n "$BRICKLINK_CONSUMER_KEY" && -n "$BRICKLINK_CONSUMER_SECRET" && -n "$BRICKLINK_TOKEN" && -n "$BRICKLINK_TOKEN_SECRET" ]]; then
            python run_all.py --delay-seconds 0
          else
            python run_all.py --skip-bricklink --delay-seconds 0
          fi
